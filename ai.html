<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake Game</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #e94560;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin: 0 0 10px 0;
            text-shadow: 0 0 10px #e94560;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            width: 400px;
            font-size: 1.2rem;
            margin-bottom: 15px;
            font-weight: bold;
            color: #0f3460;
            text-shadow: 0 0 5px #0f3460;
        }

        .score-box {
            background: #e94560;
            color: #1a1a2e;
            padding: 5px 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px #e94560;
        }

        canvas {
            background-color: #16213e;
            border: 4px solid #0f3460;
            border-radius: 10px;
            box-shadow: 0 0 20px #0f3460;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 26, 46, 0.9);
            padding: 30px;
            border: 2px solid #e94560;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 20px #e94560;
        }

        button {
            background-color: #e94560;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            font-family: inherit;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
        }

        button:hover {
            background-color: #ff5c77;
            box-shadow: 0 0 15px #ff5c77;
        }
    </style>
</head>
<body>

    <h1>NEON SNAKE</h1>
    
    <div class="scoreboard">
        <div class="score-box">Score: <span id="score">0</span></div>
        <div class="score-box">High Score: <span id="highScore">0</span></div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div id="game-over">
        <h2>GAME OVER</h2>
        <p>You crashed!</p>
        <button onclick="resetGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("highScore");
        const gameOverScreen = document.getElementById("game-over");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let dx = 0;
        let dy = 0;
        let berryX = 15;
        let berryY = 15;
        let score = 0;
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        let gameSpeed = 100;
        let gameLoopTimeout;
        let isGameOver = false;

        highScoreElement.textContent = highScore;

        // Initialize game
        function resetGame() {
            snake = [
                {x: 10, y: 10},
                {x: 10, y: 11},
                {x: 10, y: 12}
            ];
            dx = 0;
            dy = -1; // Start moving up
            score = 0;
            gameSpeed = 120; // Starting speed (lower is faster)
            scoreElement.textContent = score;
            gameOverScreen.style.display = "none";
            isGameOver = false;
            placeBerry();
            clearTimeout(gameLoopTimeout);
            gameLoop();
        }

        // Main game loop
        function gameLoop() {
            if (isGameOver) return;

            gameLoopTimeout = setTimeout(function() {
                clearCanvas();
                moveSnake();
                checkCollision();
                drawBerry();
                drawSnake();
                gameLoop();
            }, gameSpeed);
        }

        function clearCanvas() {
            ctx.fillStyle = "#16213e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                // Head is a different color than the body
                ctx.fillStyle = index === 0 ? "#0f3460" : "#43aa8b";
                ctx.strokeStyle = "#16213e";
                
                // Draw rounded rectangles for the snake to make it look nicer
                ctx.beginPath();
                ctx.roundRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize, 5);
                ctx.fill();
                ctx.stroke();
            });
        }

        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head); // Add new head

            // Check if berry was eaten
            if (head.x === berryX && head.y === berryY) {
                score += 10;
                scoreElement.textContent = score;
                
                // Increase speed slightly every time a berry is eaten, down to a minimum cap
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                }

                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem("snakeHighScore", highScore);
                }
                placeBerry();
            } else {
                snake.pop(); // Remove tail if no berry eaten
            }
        }

        function drawBerry() {
            ctx.fillStyle = "#e94560";
            ctx.beginPath();
            // Draw a circular berry
            ctx.arc(
                berryX * gridSize + gridSize / 2, 
                berryY * gridSize + gridSize / 2, 
                gridSize / 2.2, 
                0, 
                2 * Math.PI
            );
            ctx.fill();
        }

        function placeBerry() {
            berryX = Math.floor(Math.random() * tileCount);
            berryY = Math.floor(Math.random() * tileCount);

            // Ensure berry doesn't spawn ON the snake
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === berryX && snake[i].y === berryY) {
                    placeBerry();
                    break;
                }
            }
        }

        function checkCollision() {
            const head = snake[0];

            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                triggerGameOver();
            }

            // Self collision (start checking from index 1 to ignore head)
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    triggerGameOver();
                }
            }
        }

        function triggerGameOver() {
            isGameOver = true;
            gameOverScreen.style.display = "block";
        }

        // Control input
        document.addEventListener("keydown", (event) => {
            // Prevent default scrolling for arrow keys
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight", " "].indexOf(event.key) > -1) {
                event.preventDefault();
            }

            const isGoingUp = dy === -1;
            const isGoingDown = dy === 1;
            const isGoingRight = dx === 1;
            const isGoingLeft = dx === -1;

            if (event.key === "ArrowLeft" && !isGoingRight) {
                dx = -1;
                dy = 0;
            }
            if (event.key === "ArrowUp" && !isGoingDown) {
                dx = 0;
                dy = -1;
            }
            if (event.key === "ArrowRight" && !isGoingLeft) {
                dx = 1;
                dy = 0;
            }
            if (event.key === "ArrowDown" && !isGoingUp) {
                dx = 0;
                dy = 1;
            }
            
            // Allow spacebar to restart if game is over
            if (event.key === " " && isGameOver) {
                resetGame();
            }
        });

        // Start the game initially
        resetGame();
    </script>
</body>
</html>
